<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">

</head>

<body class="admin-body">

<h1>🔐 Panel de Administración</h1>

<div class="dashboard-admin">

  <div class="card-dashboard">
    <h3>💰 Ventas Totales</h3>
    <p id="ventas-total">$0</p>
  </div>

  <div class="card-dashboard">
    <h3>🛒 Productos Vendidos</h3>
    <p id="productos-vendidos">0</p>
  </div>

  <div class="card-dashboard">
    <h3>📦 Productos Sin Stock</h3>
    <p id="sin-stock">0</p>
  </div>

  <div class="card-dashboard">
    <h3>📋 Pedidos</h3>
    <p id="total-pedidos">0</p>
  </div>

</div>

<!-- BOTÓN NUEVO PRODUCTO -->
<button onclick="mostrarFormularioNuevo()" class="btn-reset">
  ➕ Nuevo producto
</button>

<!-- FORMULARIO -->
<div id="form-nuevo"></div>

<!-- LISTA PRODUCTOS -->
<div id="admin-productos" class="admin-grid"></div>

<script src="admin.js"></script>

</body>
</html>
